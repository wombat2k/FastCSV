name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-macos:
    name: Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Swift 6.2
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'
      - name: Build
        run: swift build
      - name: Test
        run: swift test
      - name: Build Examples
        run: cd Examples && swift build

  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    container: swift:6.2
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Test
        run: swift test
